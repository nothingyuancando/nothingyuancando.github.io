<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"><a href="{% if page.lang == 'zh' %}{{ '/' | relative_url }}zh/{% else %}{{ '/' | relative_url }}{% endif %}#about-me">{% if page.lang == 'zh' %}主页{% else %}Homepage{% endif %}</a></li>
          {% assign navigation_links = site.data.navigation.main %}
          {% if page.lang == 'zh' %}{% assign navigation_links = site.data.navigation.zh %}{% endif %}
          {% for link in navigation_links %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
          <li class="masthead__menu-item masthead__menu-language"><a href="{% if page.lang == 'zh' %}{{ '/' | relative_url }}{% else %}{{ '/zh/' | relative_url }}{% endif %}" aria-label="{% if page.lang == 'zh' %}Switch to English{% else %}切换到中文{% endif %}" title="{% if page.lang == 'zh' %}English{% else %}中文{% endif %}"><i class="fas fa-globe" aria-hidden="true"></i></a></li>
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
