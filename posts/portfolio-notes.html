        <div class="post-meta">
          <time datetime="2026-06-26">2026-06-26</time>
          <a href="../categories.html#notes">notes</a>
        </div>

        <p>
          作品集不是越花越好。最重要的是让别人快速看懂：你做了什么，为什么做，怎么做，结果如何。
        </p>

        <h2>推荐结构</h2>
        <ul>
          <li>项目背景：解决什么问题</li>
          <li>你的角色：负责哪些部分</li>
          <li>关键实现：技术选型、核心功能、难点</li>
          <li>最终结果：截图、链接、数据或复盘</li>
        </ul>

        <blockquote>
          好的作品集像一份工作档案，而不是一张海报。
        </blockquote>
      </article>
